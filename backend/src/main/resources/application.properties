spring.application.name=restaurant-platform

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/restaurant_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:sayan@12345}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=${HIKARI_MIN_IDLE:3}
spring.datasource.hikari.connection-timeout=${HIKARI_CONNECTION_TIMEOUT:30000}
spring.datasource.hikari.idle-timeout=${HIKARI_IDLE_TIMEOUT:120000}
spring.datasource.hikari.max-lifetime=${HIKARI_MAX_LIFETIME:300000}
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.leak-detection-threshold=60000

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# Actuator Configuration for Health Checks
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true
management.health.mail.enabled=false

# Server Configuration
server.port=8080
server.servlet.context-path=/api

# CORS Configuration
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4200,https://restaurant-platform-chi.vercel.app,https://restaurant-platform.com}

# JWT Configuration
jwt.secret=${JWT_SECRET:restaurant-platform-secret-key-very-long}
jwt.expiration=${JWT_EXPIRATION:14400000}

# Logging
logging.level.root=INFO
logging.level.com.example.restaurantplatform=DEBUG

# Resend Email Configuration (uses HTTPS port 443, works on Render free tier)
# Free tier: 100 emails/day, 3,000 emails/month ? no expiry
app.resend.api-key=${RESEND_API_KEY:}
app.resend.from-email=${RESEND_FROM_EMAIL:onboarding@resend.dev}
app.mail.enabled=${MAIL_ENABLED:true}

