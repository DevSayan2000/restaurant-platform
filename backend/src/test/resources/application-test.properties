# =============================================================
# Test Profile Configuration (H2 In-Memory Database)
# Used by CI pipeline and local test execution
# =============================================================

spring.application.name=restaurant-platform

# H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA/Hibernate Configuration (let Hibernate auto-detect dialect for H2)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Disable Flyway for tests (H2 uses Hibernate auto-DDL instead)
spring.flyway.enabled=false

# Actuator
management.endpoints.web.exposure.include=health,info

# Server Configuration
server.port=0
server.servlet.context-path=/api

# CORS
app.cors.allowed-origins=http://localhost:4200

# JWT Configuration
jwt.secret=test-secret-key-for-ci-pipeline-must-be-at-least-256-bits-long-enough
jwt.expiration=3600000

# Logging - minimal for tests
logging.level.root=WARN
logging.level.com.example.restaurantplatform=INFO

# Mail Configuration - disabled for tests
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=test
spring.mail.password=test
app.mail.enabled=false


