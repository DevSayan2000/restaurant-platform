<div class="min-h-screen flex items-center justify-center">
    <p-card [style]="{ width: '28rem' }" class="pt-2">

        <ng-template #header>
            <h2 class="text-2xl font-bold text-center">
                🍽 Create Account
            </h2>
            <p class="text-center text-gray-500">
                Join our restaurant platform
            </p>
        </ng-template>

        <form [formGroup]="signUpForm" (ngSubmit)="onSubmit()" class="space-y-5">

            <!-- Account Type -->
            <div>
                <label class="block text-sm font-medium mb-2">
                    Account Type
                </label>

                <p-selectButton [options]="accountTypes" formControlName="role" optionLabel="label" optionValue="value"
                    class="w-full"></p-selectButton>
            </div>

            <!-- Name -->
            <div>
                <label class="block text-sm font-medium mb-1">Name</label>
                <input pInputText type="text" formControlName="name" class="w-full" placeholder="Enter your name" />
                <small *ngIf="submitted && f['name']?.errors" class="text-red-500">
                    Name must be at least 3 characters
                </small>
            </div>

            <!-- Email -->
            <div>
                <label class="block text-sm font-medium mb-1">Email</label>
                <input pInputText type="email" formControlName="email" class="w-full" placeholder="Enter your email" />
                <small *ngIf="submitted && f['email']?.errors" class="text-red-500">
                    Enter a valid email address
                </small>
            </div>

            <!-- Password -->
            <div>
                <label class="block text-sm font-medium mb-1">Password</label>
                <p-password formControlName="password" toggleMask [feedback]="false" styleClass="w-full"
                    inputStyleClass="w-full" placeholder="Enter password"></p-password>
                <small *ngIf="submitted && f['password']?.errors" class="text-red-500">
                    Password must be at least 6 characters
                </small>
            </div>

            <!-- Confirm Password -->
            <div>
                <label class="block text-sm font-medium mb-1">Confirm Password</label>
                <p-password formControlName="confirmPassword" toggleMask [feedback]="false" styleClass="w-full"
                    inputStyleClass="w-full" placeholder="Confirm password"></p-password>

                <small *ngIf="submitted && signUpForm.errors?.['passwordMismatch']" class="text-red-500">
                    Passwords do not match
                </small>
            </div>

            <!-- Submit -->
            <button pButton type="submit" label="Create Account"
                class="w-full border-none"></button>

            <!-- Back to Login -->
            <div class="text-center pt-2">
                <a routerLink="/sign-in" class="text-sm text-orange-600 hover:underline font-medium">
                    Already have an account? Login
                </a>
            </div>

        </form>
    </p-card>
</div>
