<p-card 
  class="cursor-pointer transition-all duration-200 hover:shadow-lg rounded-xl border border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-900 h-full" [routerLink]="'/restaurants/'+data.id">

  <div class="flex items-center justify-between mb-2">

    <div class="max-w-48">
      <app-truncate-text 
        [text]="data.name"
        class="font-semibold text-lg text-zinc-900 dark:text-zinc-100">
      </app-truncate-text>
    </div>

    <p-tag [value]="data.foodType" [severity]="getTagSeverity(data.foodType)"></p-tag>
  </div>

  <p class="text-sm text-zinc-500 dark:text-zinc-400 break-all">
    {{ data.cuisine }} • {{ data.city }}
  </p>

  <div class="mt-3 flex items-center gap-1">
    <i class="pi pi-star-fill text-yellow-500 text-sm"></i>
    <span class="text-sm text-zinc-700 dark:text-zinc-300">
      {{ data.avgRating || '-' }}
    </span>
  </div>

</p-card>
