<p-card class="rounded-xl bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800">

  <h3 class="text-xl font-semibold mb-4 text-zinc-900 dark:text-zinc-100">
    {{ title }}
  </h3>

  <ng-container *ngIf="restaurants.length > 0; else empty">

    <div 
      class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5 transition-all duration-300 ease-in-out"
      [class.max-h-full]="expanded"
      [class.max-h-[460px]]="!expanded">

      <app-restaurant-card
        *ngFor="let r of visibleRestaurants"
        [data]="r">
      </app-restaurant-card>

    </div>

    <div class="text-center mt-4" *ngIf="showExpandButton && restaurants.length > 3">
      <button 
        pButton 
        (click)="toggleExpand()"
        [label]="expanded ? 'Show Less' : 'View All'"
        [icon]="expanded ? 'pi pi-chevron-up' : 'pi pi-chevron-down'"
        class="p-button-text text-zinc-700 dark:text-zinc-300">
      </button>
    </div>

  </ng-container>

  <ng-template #empty>
    <div class="text-center py-12 text-zinc-500 dark:text-zinc-400">
      <i class="pi pi-shop text-3xl mb-3 block opacity-50"></i>
      <p>No restaurants available.</p>
    </div>
  </ng-template>

</p-card>
