<div class="grid grid-cols-1 md:grid-cols-3 gap-4">

    <!-- Restaurants Count -->
    <p-card class="rounded-xl" 
        styleClass="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800">
        <p class="text-sm text-zinc-500 dark:text-zinc-400">Your reviewed restaurants</p>
        <h3 class="text-2xl font-bold text-zinc-900 dark:text-zinc-100">
            {{ totalRestaurants }}
        </h3>
    </p-card>

    <!-- User Reviews -->
    <p-card class="rounded-xl"
        styleClass="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800">
        <p class="text-sm text-zinc-500 dark:text-zinc-400">Your Reviews</p>
        <h3 class="text-2xl font-bold text-zinc-900 dark:text-zinc-100">
            {{ userReviews }}
        </h3>
    </p-card>

    <!-- Average Rating -->
    <p-card class="rounded-xl"
        styleClass="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800">
        <p class="text-sm text-zinc-500 dark:text-zinc-400">Avg Rating</p>
        <h3 class="text-2xl font-bold text-zinc-900 dark:text-zinc-100 flex items-center gap-1">
            {{ avgRating }} <i class="pi pi-star-fill text-yellow-500 text-base"></i>
        </h3>
    </p-card>

</div>
