<div class="space-y-6 bg-zinc-50 dark:bg-zinc-950 h-full">

    <!-- Welcome -->
    <div class="rounded-xl p-6
               bg-white dark:bg-zinc-900
               border border-zinc-200 dark:border-zinc-800">
        <h2 class="text-2xl font-semibold text-zinc-900 dark:text-zinc-100">
            Welcome back 👋
        </h2>
        <p class="text-zinc-500">
            Discover restaurants and share your experience
        </p>
    </div>

    <!-- Stats -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">

        <div class="rounded-xl p-4
                   bg-white dark:bg-zinc-900
                   border border-zinc-200 dark:border-zinc-800">
            <p class="text-sm text-zinc-500">Restaurants</p>
            <h3 class="text-2xl font-bold text-zinc-900 dark:text-zinc-100">
                120+
            </h3>
        </div>

        <div class="rounded-xl p-4
                   bg-white dark:bg-zinc-900
                   border border-zinc-200 dark:border-zinc-800">
            <p class="text-sm text-zinc-500">Your Reviews</p>
            <h3 class="text-2xl font-bold text-zinc-900 dark:text-zinc-100">
                8
            </h3>
        </div>

        <div class="rounded-xl p-4
                   bg-white dark:bg-zinc-900
                   border border-zinc-200 dark:border-zinc-800">
            <p class="text-sm text-zinc-500">Avg Rating</p>
            <h3 class="text-2xl font-bold text-zinc-900 dark:text-zinc-100">
                4.2 <span class="text-sm">⭐</span>
            </h3>
        </div>

    </div>

    <!-- Restaurant List -->
    <div class="rounded-xl p-6
           bg-white dark:bg-zinc-900
           border border-zinc-200 dark:border-zinc-800">

        <h3 class="text-xl font-semibold mb-4 text-zinc-900 dark:text-zinc-100">
            Popular Restaurants
        </h3>

        <!-- Restaurants Exist -->
        <ng-container *ngIf="restaurants?.length > 0; else noRestaurants">

            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">

                <div *ngFor="let r of restaurants" class="rounded-lg p-4 cursor-pointer transition
                       border border-zinc-200 dark:border-zinc-800
                       hover:bg-zinc-50 dark:hover:bg-zinc-800">

                    <h4 class="font-semibold text-zinc-900 dark:text-zinc-100">
                        {{ r.name }}
                    </h4>

                    <p class="text-sm text-zinc-500">
                        {{ r.cuisine }}
                    </p>

                    <p class="text-sm text-zinc-600 dark:text-zinc-400">
                        ⭐ {{ r.rating }}
                    </p>
                </div>

            </div>

        </ng-container>

        <!-- No Restaurants -->
        <ng-template #noRestaurants>
            <div class="text-center py-12 text-zinc-500">
                <i class="pi pi-shop text-3xl mb-3 block opacity-40"></i>
                <p class="text-sm">
                    No restaurants available right now.
                </p>
            </div>
        </ng-template>

    </div>


</div>
