<nav class="border-b border-zinc-200 dark:border-zinc-800 px-6 py-3 flex items-center justify-between bg-white dark:bg-zinc-950 h-20">

    <!-- Logo -->
    <div class="flex items-center gap-2">
        <span class="text-2xl">🍽</span>
        <span class="text-xl font-semibold text-zinc-900 dark:text-zinc-100">
            Restaurant Platform
        </span>
    </div>

    <!-- Right Section -->
    <div class="flex items-center gap-3">

        <!-- Not Logged In -->
        <ng-container *ngIf="!auth.isLoggedIn; else loggedIn">
            <button
                pButton
                label="Login"
                class="p-button-text text-zinc-700 dark:text-zinc-300"
                routerLink="/sign-in">
            </button>

            <button
                pButton
                label="Sign Up"
                class="p-button p-button-primary"
                routerLink="/sign-up">
            </button>
        </ng-container>

        <!-- Logged In -->
        <ng-template #loggedIn>
            <div
                class="flex items-center gap-2 px-3 py-1.5 rounded-lg
                       bg-zinc-100 dark:bg-zinc-900
                       border border-zinc-200 dark:border-zinc-800">

                <i class="pi pi-user text-zinc-600 dark:text-zinc-400"></i>

                <div class="text-sm leading-tight">
                    <p class="font-medium text-zinc-900 dark:text-zinc-100">
                        {{ auth.user?.name }}
                    </p>
                    <p class="text-zinc-500">
                        {{ auth.user?.email }}
                    </p>
                </div>
            </div>

            <button
                pButton
                icon="pi pi-sign-out"
                class="p-button-text text-zinc-500 hover:text-red-500"
                (click)="logout()">
            </button>
        </ng-template>

    </div>
</nav>
