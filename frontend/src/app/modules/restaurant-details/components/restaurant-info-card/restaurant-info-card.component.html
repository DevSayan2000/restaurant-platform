<p-card class="rounded-xl shadow-md border border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-950">

    <div class="flex items-start justify-between gap-6" *ngIf="restaurant">

        <!-- LEFT: Restaurant Info -->
        <div class="space-y-2">

            <!-- Restaurant Name -->
            <h2 class="text-2xl font-semibold text-zinc-900 dark:text-zinc-100 break-all">
                {{ restaurant.name }}
            </h2>

            <!-- City -->
            <p class="text-sm text-zinc-600 dark:text-zinc-400 break-all">
                <i class="pi pi-map-marker mr-1"></i>
                {{ restaurant.city }}
            </p>

            <!-- Cuisine -->
            <p class="text-sm text-zinc-700 dark:text-zinc-300 flex items-center gap-2 break-all">
                <i class="pi pi-tag text-sm"></i>
                {{ restaurant.cuisine }}
            </p>

            <!-- Food Type -->
            <p-tag 
                [value]="restaurant.foodType"
                [severity]="getFoodTypeSeverity(restaurant.foodType)">
            </p-tag>

        </div>

        <!-- RIGHT: Ratings and Info -->
        <div class="text-right shrink-0">

            <!-- Rating Display -->
            <div class="flex items-center justify-end gap-1">
                <i class="pi pi-star-fill text-yellow-500"></i>

                <span class="text-lg font-semibold text-zinc-900 dark:text-zinc-100">
                    {{ restaurant.avgRating ?? 'No rating yet' }}
                </span>
            </div>

            <!-- Created Date -->
            <p class="text-xs text-zinc-500 dark:text-zinc-400 mt-1">
                {{ restaurant.createdDate | date:'mediumDate' }}
            </p>
        </div>

    </div>

</p-card>
