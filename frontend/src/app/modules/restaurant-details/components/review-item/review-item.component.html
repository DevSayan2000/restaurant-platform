<p-card class="rounded-lg border border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-900">

    <div class="flex justify-between items-start" *ngIf="review">

        <div class="space-y-1">
            <!-- Rating -->
            <div class="flex items-center gap-1">
                <i class="pi pi-star-fill text-yellow-500 text-sm"></i>
                <span class="font-medium text-zinc-800 dark:text-zinc-200">
                    {{ review.rating }}
                </span>
            </div>

            <!-- Review text -->
            <p class="text-zinc-700 dark:text-zinc-300">
                {{ review.review }}
            </p>

            <!-- User & date -->
            <p class="text-xs text-zinc-500 dark:text-zinc-400">
                by {{ review.createdBy }} • {{ review.createdDate | date:'mediumDate' }}
            </p>
        </div>

        <!-- Delete button only visible to owner -->
        <button *ngIf="canDelete"
                pButton 
                icon="pi pi-trash"
                class="p-button-text p-button-danger"
                (click)="onDeleteClick()">
        </button>

    </div>

</p-card>
