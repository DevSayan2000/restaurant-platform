<p-dialog [(visible)]="visible" [modal]="true" [closable]="true" [dismissableMask]="true" [showHeader]="false"
    [style]="{ width: '400px' }" [contentStyle]="{ padding: '0' }" class="rounded-xl">
    <div class="p-6 space-y-4">

        <!-- ICON & TITLE -->
        <div class="flex items-center gap-3">
            <i [class]="icon + ' text-2xl'"></i>

            <h3 class="text-lg font-semibold text-gray-900 dark:text-gray-100">
                {{ options.title }}
            </h3>
        </div>

        <!-- MESSAGE -->
        <p class="text-sm text-gray-600 dark:text-gray-300">
            {{ options.message }}
        </p>

        <!-- BUTTONS -->
        <div class="flex justify-end gap-3">

            <button pButton *ngIf="options.cancelLabel" type="button" class="p-button-text"
                [label]="options.cancelLabel || ''" (click)="reject()">
            </button>

            <button pButton type="button" [label]="options.confirmLabel || ''" [severity]="severity" (click)="accept()">
            </button>
        </div>

    </div>
</p-dialog>
