<div class="space-y-6 bg-zinc-50 dark:bg-zinc-950">

    <!-- Header -->
    <p-card class="rounded-xl border border-zinc-200 dark:border-zinc-800" styleClass="bg-white dark:bg-zinc-900">
        <h2 class="text-2xl font-semibold text-zinc-900 dark:text-zinc-100">
            Your Reviews
        </h2>
        <p class="text-zinc-500 dark:text-zinc-400 mt-1">
            All the reviews you have submitted
        </p>
    </p-card>

    <h3 class="text-lg font-semibold mb-4">Reviews</h3>

    <div class="rounded-xl overflow-hidden">
        <p-table [value]="userReviews" [paginator]="true" [rows]="10" tableStyleClass="table-fixed">

            <ng-template pTemplate="header">
                <tr>
                    <th class="w-1/4">Name</th>
                    <th class="w-1/4">Review</th>
                    <th>Rating</th>
                    <th>Date</th>
                </tr>
            </ng-template>

            <ng-template pTemplate="body" let-r>
                <tr class="w-full">

                    <td class="w-1/4">
                        <app-truncate-text [text]="r.restaurant" class="w-full"></app-truncate-text>
                    </td>
                    <td class="w-1/4">
                        <app-truncate-text [text]="r.review"></app-truncate-text>
                    </td>

                    <td>
                        <div class="flex items-center gap-1">
                            @if (r.rating !== null && r.rating !== undefined) {
                            <i class="pi pi-star-fill text-yellow-500 text-xs"></i>
                            <span class="text-zinc-700 dark:text-zinc-300">{{ r.rating }}</span>
                            } @else {
                            {{'-'}}
                            }

                        </div>
                    </td>

                    <td class="text-zinc-500 dark:text-zinc-400">
                        {{ r.createdDate | date:'mediumDate' }}
                    </td>

                </tr>
            </ng-template>

            <!-- EMPTY MESSAGE -->
            <ng-template pTemplate="emptymessage">
                <tr>
                    <td colspan="8" class="text-center py-6 text-zinc-500">
                        <div class="py-16 text-center text-zinc-500 dark:text-zinc-400">

                            <div class="flex justify-center mb-4">
                                <div
                                    class="w-16 h-16 rounded-full bg-zinc-100 dark:bg-zinc-800 flex items-center justify-center">
                                    <i class="pi pi-shop text-3xl opacity-60"></i>
                                </div>
                            </div>

                            <p class="text-lg font-semibold mb-1">No reviews found</p>

                        </div>
                    </td>
                </tr>
            </ng-template>

        </p-table>
    </div>
</div>
